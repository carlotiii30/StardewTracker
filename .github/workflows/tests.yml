name: Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: stardew-tracker/package-lock.json

      - name: Install dependencies
        working-directory: stardew-tracker
        run: npm ci --legacy-peer-deps

      - name: Run tests
        working-directory: stardew-tracker
        run: npm run test:run
